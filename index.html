<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1c1c1e">
  <title>ダイス</title>
  <style>
    :root {
      --bg: #1c1c1e;
      --bg2: #2c2c2e;
      --bg3: #3a3a3c;
      --label: #ffffff;
      --label2: rgba(255,255,255,0.6);
      --label3: rgba(255,255,255,0.3);
      --accent: #0a84ff;
      --accent2: #30d158;
      --destructive: #ff453a;
      --separator: rgba(255,255,255,0.12);
      --card: rgba(44,44,46,0.95);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--label);
      font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Header ── */
    header {
      padding: calc(env(safe-area-inset-top) + 16px) 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(28,28,30,0.85);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--separator);
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .history-btn {
      background: var(--bg3);
      border: none;
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .history-btn:active { opacity: 0.6; }

    /* ── Main scroll ── */
    main {
      flex: 1;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Section card ── */
    .card {
      background: var(--bg2);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-header {
      padding: 14px 16px 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--label2);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    /* ── Face selector ── */
    .face-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 8px 14px 14px;
    }

    .face-btn {
      background: var(--bg3);
      border: 2px solid transparent;
      border-radius: var(--radius-sm);
      padding: 10px 6px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all .15s;
      position: relative;
      min-height: 64px;
      justify-content: center;
    }

    .face-btn.selected {
      background: rgba(10,132,255,0.18);
      border-color: var(--accent);
    }

    .face-btn:active { transform: scale(0.94); }

    .face-icon {
      width: 28px;
      height: 28px;
    }

    .face-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--label2);
    }

    .face-btn.selected .face-label {
      color: var(--accent);
    }

    /* ── Count selector ── */
    .count-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
    }

    .count-label {
      font-size: 17px;
      font-weight: 500;
    }

    .count-controls {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--bg3);
      border-radius: 22px;
      overflow: hidden;
    }

    .count-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 22px;
      font-weight: 300;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .15s;
      line-height: 1;
    }

    .count-btn:disabled { color: var(--label3); }
    .count-btn:active:not(:disabled) { opacity: 0.5; }

    .count-value {
      font-size: 20px;
      font-weight: 700;
      min-width: 36px;
      text-align: center;
    }

    /* ── Roll button ── */
    .roll-btn {
      background: linear-gradient(135deg, #0a84ff, #0066cc);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.2px;
      padding: 16px;
      cursor: pointer;
      width: 100%;
      transition: transform .12s, opacity .12s, box-shadow .12s;
      box-shadow: 0 4px 20px rgba(10,132,255,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .roll-btn:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    .roll-btn.rolling {
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 4px 20px rgba(10,132,255,0.35); }
      to   { box-shadow: 0 4px 30px rgba(10,132,255,0.65); }
    }

    /* ── Result area ── */
    .result-section {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .result-summary {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .result-tag {
      font-size: 12px;
      font-weight: 600;
      color: var(--label2);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .result-total {
      font-size: 64px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      color: var(--label);
      transition: all 0.3s;
    }

    .result-total.animate {
      animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0%   { transform: scale(0.6); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    .result-desc {
      font-size: 14px;
      color: var(--label2);
    }

    /* ── Dice display grid ── */
    .dice-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .die-card {
      background: var(--bg2);
      border-radius: 14px;
      width: 68px;
      height: 68px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      animation: dieAppear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
      border: 2px solid transparent;
    }

    .die-card.max-val { border-color: var(--accent2); }
    .die-card.min-val { border-color: var(--destructive); }

    @keyframes dieAppear {
      from { transform: scale(0.5) rotate(-15deg); opacity: 0; }
      to   { transform: scale(1)   rotate(0deg);   opacity: 1; }
    }

    .die-value {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .die-face-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--label3);
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat-card {
      background: var(--bg2);
      border-radius: var(--radius-sm);
      padding: 10px 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--label2);
      margin-top: 3px;
    }

    /* ── Rolling animation overlay ── */
    .rolling-dice {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .rolling-die {
      width: 68px;
      height: 68px;
      background: var(--bg3);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      animation: shake 0.1s ease-in-out infinite;
    }

    @keyframes shake {
      0%   { transform: rotate(-8deg) scale(0.95); }
      50%  { transform: rotate(8deg)  scale(1.05); }
      100% { transform: rotate(-8deg) scale(0.95); }
    }

    /* ── History sheet ── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: none;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .sheet-overlay.open { display: block; animation: fadeIn .2s ease; }

    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1c1c1e;
      border-radius: 20px 20px 0 0;
      max-height: 70dvh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 201;
    }

    .sheet-overlay.open .sheet {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--bg3);
      border-radius: 2px;
      margin: 10px auto 0;
    }

    .sheet-title {
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--separator);
    }

    .sheet-content {
      overflow-y: auto;
      padding: 12px 16px;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    .history-item {
      background: var(--bg2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .history-meta {
      font-size: 13px;
      color: var(--label2);
    }

    .history-vals {
      font-size: 13px;
      color: var(--label3);
      margin-top: 2px;
    }

    .history-total {
      font-size: 22px;
      font-weight: 800;
    }

    .empty-history {
      text-align: center;
      color: var(--label3);
      padding: 40px 0;
      font-size: 15px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--destructive);
      font-size: 15px;
      font-weight: 500;
      padding: 12px 16px;
      cursor: pointer;
      width: 100%;
      border-top: 1px solid var(--separator);
      text-align: center;
      transition: opacity .15s;
    }
    .clear-btn:active { opacity: 0.6; }

    /* ── Placeholder ── */
    .empty-result {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 40px 16px;
      text-align: center;
      color: var(--label3);
      font-size: 15px;
    }

    .empty-result-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 10px;
      opacity: 0.4;
    }

    /* ── Color for high/low ── */
    .max-val .die-value { color: var(--accent2); }
    .min-val .die-value { color: var(--destructive); }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>🎲 ダイス</h1>
    <button class="history-btn" onclick="openHistory()">履歴</button>
  </header>

  <!-- Main -->
  <main>
    <!-- Face selector -->
    <div class="card">
      <div class="card-header">ダイスの種類</div>
      <div class="face-grid" id="faceGrid"></div>
    </div>

    <!-- Count selector -->
    <div class="card">
      <div class="count-row">
        <span class="count-label">個数</span>
        <div class="count-controls">
          <button class="count-btn" id="minusBtn" onclick="changeCount(-1)">−</button>
          <span class="count-value" id="countVal">1</span>
          <button class="count-btn" id="plusBtn" onclick="changeCount(1)">+</button>
        </div>
      </div>
    </div>

    <!-- Roll button -->
    <button class="roll-btn" id="rollBtn" onclick="rollDice()">
      <span id="rollBtnIcon">🎲</span>
      <span id="rollBtnText">ロール</span>
    </button>

    <!-- Result -->
    <div id="resultArea">
      <div class="empty-result">
        <span class="empty-result-icon">🎲</span>
        ダイスをロールしてください
      </div>
    </div>
  </main>

  <!-- History sheet overlay -->
  <div class="sheet-overlay" id="sheetOverlay" onclick="handleOverlayClick(event)">
    <div class="sheet" id="historySheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">ロール履歴</div>
      <div class="sheet-content" id="historyContent"></div>
      <button class="clear-btn" onclick="clearHistory()">履歴をクリア</button>
    </div>
  </div>

  <script>
    // ── State ──
    const FACES = [4, 6, 8, 10, 12, 20, 100];
    let selectedFace = 6;
    let diceCount = 1;
    let history = JSON.parse(localStorage.getItem('diceHistory') || '[]');
    let isRolling = false;

    // ── SVG icons for each die ──
    const dieSVG = {
      4: `<svg class="face-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="14,3 26,24 2,24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <line x1="14" y1="3" x2="14" y2="24" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
          </svg>`,
      6: `<svg class="face-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="22" height="22" rx="5" stroke="currentColor" stroke-width="2"/>
            <circle cx="9" cy="9" r="2" fill="currentColor"/>
            <circle cx="19" cy="19" r="2" fill="currentColor"/>
          </svg>`,
      8: `<svg class="face-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="14,2 26,14 14,26 2,14" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <line x1="14" y1="2" x2="14" y2="26" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
          </svg>`,
      10: `<svg class="face-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
             <polygon points="14,2 26,9 22,23 6,23 2,9" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
           </svg>`,
      12: `<svg class="face-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
             <polygon points="14,2 24,8 27,19 20,27 8,27 1,19 4,8" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
           </svg>`,
      20: `<svg class="face-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
             <polygon points="14,2 26,10 22,24 6,24 2,10" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
             <line x1="14" y1="2" x2="6" y2="24" stroke="currentColor" stroke-width="1" opacity=".35"/>
             <line x1="14" y1="2" x2="22" y2="24" stroke="currentColor" stroke-width="1" opacity=".35"/>
             <line x1="2" y1="10" x2="26" y2="10" stroke="currentColor" stroke-width="1" opacity=".35"/>
           </svg>`,
      100: `<svg class="face-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="14" cy="14" r="11" stroke="currentColor" stroke-width="2"/>
              <text x="14" y="18" text-anchor="middle" fill="currentColor" font-size="8" font-weight="700" font-family="-apple-system,sans-serif">00</text>
            </svg>`,
    };

    // ── Build face grid ──
    function buildFaceGrid() {
      const grid = document.getElementById('faceGrid');
      grid.innerHTML = '';
      FACES.forEach(f => {
        const btn = document.createElement('button');
        btn.className = 'face-btn' + (f === selectedFace ? ' selected' : '');
        btn.innerHTML = `
          ${dieSVG[f] || ''}
          <span class="face-label">D${f}</span>
        `;
        btn.style.color = f === selectedFace ? 'var(--accent)' : 'var(--label2)';
        btn.onclick = () => selectFace(f);
        grid.appendChild(btn);
      });
    }

    function selectFace(f) {
      selectedFace = f;
      buildFaceGrid();
    }

    // ── Count ──
    function changeCount(delta) {
      diceCount = Math.max(1, Math.min(10, diceCount + delta));
      document.getElementById('countVal').textContent = diceCount;
      document.getElementById('minusBtn').disabled = diceCount <= 1;
      document.getElementById('plusBtn').disabled = diceCount >= 10;
    }

    // ── Roll ──
    async function rollDice() {
      if (isRolling) return;
      isRolling = true;

      playRollSound(diceCount);

      const btn = document.getElementById('rollBtn');
      btn.classList.add('rolling');
      document.getElementById('rollBtnText').textContent = 'ロール中…';

      // Show shaking dice preview
      const resultArea = document.getElementById('resultArea');
      let shakingHTML = '<div class="rolling-dice">';
      for (let i = 0; i < diceCount; i++) {
        shakingHTML += `<div class="rolling-die">🎲</div>`;
      }
      shakingHTML += '</div>';
      resultArea.innerHTML = shakingHTML;

      // Roll with delay for animation
      await new Promise(r => setTimeout(r, 600));

      // Generate results
      const results = [];
      for (let i = 0; i < diceCount; i++) {
        results.push(Math.floor(Math.random() * selectedFace) + 1);
      }

      const total = results.reduce((a, b) => a + b, 0);
      const minVal = Math.min(...results);
      const maxVal = Math.max(...results);
      const avg = (total / results.length).toFixed(1);

      // Save to history
      history.unshift({
        face: selectedFace,
        count: diceCount,
        results,
        total,
        timestamp: new Date().toISOString()
      });
      if (history.length > 50) history.pop();
      localStorage.setItem('diceHistory', JSON.stringify(history));

      // Render result
      renderResult(results, total, minVal, maxVal, avg);

      btn.classList.remove('rolling');
      document.getElementById('rollBtnText').textContent = 'もう一度ロール';
      isRolling = false;
    }

    function renderResult(results, total, minVal, maxVal, avg) {
      const resultArea = document.getElementById('resultArea');

      // Dice grid
      let diceHTML = '<div class="dice-grid">';
      results.forEach((v, i) => {
        const isMax = v === selectedFace;
        const isMin = v === 1;
        const cls = isMax ? 'die-card max-val' : (isMin ? 'die-card min-val' : 'die-card');
        const delay = i * 60;
        diceHTML += `
          <div class="${cls}" style="animation-delay:${delay}ms">
            <span class="die-value">${v}</span>
            <span class="die-face-label">D${selectedFace}</span>
          </div>
        `;
      });
      diceHTML += '</div>';

      // Stats
      const statsHTML = results.length > 1 ? `
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-value" style="color:var(--accent2)">${maxVal}</div>
            <div class="stat-label">最大</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${avg}</div>
            <div class="stat-label">平均</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:var(--destructive)">${minVal}</div>
            <div class="stat-label">最小</div>
          </div>
        </div>
      ` : '';

      const diceDesc = `${results.length}D${selectedFace}`;

      resultArea.innerHTML = `
        <div class="result-section">
          <div class="result-summary">
            <span class="result-tag">${diceDesc} の合計</span>
            <div class="result-total animate" id="totalNum">${total}</div>
            ${results.length > 1 ? `<span class="result-desc">${results.join(' + ')}</span>` : ''}
          </div>
          ${diceHTML}
          ${statsHTML}
        </div>
      `;
    }

    // ── History ──
    function openHistory() {
      renderHistory();
      document.getElementById('sheetOverlay').classList.add('open');
    }

    function closeHistory() {
      document.getElementById('sheetOverlay').classList.remove('open');
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('sheetOverlay')) closeHistory();
    }

    function renderHistory() {
      const content = document.getElementById('historyContent');
      if (history.length === 0) {
        content.innerHTML = '<div class="empty-history">履歴がありません</div>';
        return;
      }
      content.innerHTML = history.map(h => {
        const d = new Date(h.timestamp);
        const timeStr = d.toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        return `
          <div class="history-item">
            <div>
              <div class="history-meta">${h.count}D${h.face} — ${timeStr}</div>
              ${h.results.length > 1 ? `<div class="history-vals">${h.results.join(', ')}</div>` : ''}
            </div>
            <div class="history-total">${h.total}</div>
          </div>
        `;
      }).join('');
    }

    function clearHistory() {
      history = [];
      localStorage.removeItem('diceHistory');
      renderHistory();
    }

    // ── Sound ──
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    // ホワイトノイズバースト（サラサラ〜カラカラ音）
    function playNoiseHit(ctx, startTime, duration = 0.06, gain = 0.25, freq = 1200) {
      const bufSize = ctx.sampleRate * duration;
      const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);

      const src = ctx.createBufferSource();
      src.buffer = buf;

      // バンドパスフィルタで木・プラスチック感を出す
      const bpf = ctx.createBiquadFilter();
      bpf.type = 'bandpass';
      bpf.frequency.value = freq;
      bpf.Q.value = 1.5;

      const env = ctx.createGain();
      env.gain.setValueAtTime(gain, startTime);
      env.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

      src.connect(bpf);
      bpf.connect(env);
      env.connect(ctx.destination);
      src.start(startTime);
      src.stop(startTime + duration);
    }

    // 短い打撃音（ダイスが面に当たる感じ）
    function playClick(ctx, startTime, pitch = 180) {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(pitch, startTime);
      osc.frequency.exponentialRampToValueAtTime(pitch * 0.4, startTime + 0.04);

      const env = ctx.createGain();
      env.gain.setValueAtTime(0.4, startTime);
      env.gain.exponentialRampToValueAtTime(0.001, startTime + 0.07);

      osc.connect(env);
      env.connect(ctx.destination);
      osc.start(startTime);
      osc.stop(startTime + 0.07);
    }

    // 最後の着地ドン
    function playThud(ctx, startTime) {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(90, startTime);
      osc.frequency.exponentialRampToValueAtTime(35, startTime + 0.15);

      const env = ctx.createGain();
      env.gain.setValueAtTime(0.55, startTime);
      env.gain.exponentialRampToValueAtTime(0.001, startTime + 0.2);

      osc.connect(env);
      env.connect(ctx.destination);
      osc.start(startTime);
      osc.stop(startTime + 0.2);

      // ノイズも少し混ぜる
      playNoiseHit(ctx, startTime, 0.12, 0.3, 300);
    }

    function playRollSound(count) {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;

      // ランダムな間隔でカラカラ音を鳴らす（転がり感）
      const hits = 8 + count * 2;
      for (let i = 0; i < hits; i++) {
        const t = now + i * 0.055 + Math.random() * 0.02;
        const freq = 800 + Math.random() * 1200;
        playNoiseHit(ctx, t, 0.05 + Math.random() * 0.03, 0.15 + Math.random() * 0.15, freq);
        if (i % 3 === 0) playClick(ctx, t, 120 + Math.random() * 120);
      }

      // 着地音
      playThud(ctx, now + hits * 0.055 + 0.05);
    }

    // ── Init ──
    buildFaceGrid();
    changeCount(0); // sync button states
  </script>
</body>
